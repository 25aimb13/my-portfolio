<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Aryan Kumar Pollai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">AKP.</div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <span class="badge">AI & ML Specialist</span>
            <h1 id="name">Loading...</h1>
            <p class="hero-role" id="role"></p>
            <p class="hero-bio" id="bio"></p>
            <div class="hero-btns">
                <a href="#contact" class="btn-primary">Get In Touch</a>
                <a href="https://github.com" target="_blank" class="btn-secondary">View GitHub</a>
            </div>
        </div>
    </section>

    <section id="about" class="details">
        <div class="grid">
            <div class="card">
                <h3>Expertise</h3>
                <p>Artificial Intelligence, Machine Learning, and Fullstack Web Development.</p>
            </div>
            <div class="card">
                <h3>Education</h3>
                <p>Bachelor of Science in AI & ML - Semester Project 2026.</p>
            </div>
        </div>
    </section>

    <footer id="contact">
        <h2>Let's Connect</h2>
        <div class="contact-grid">
            <div class="contact-item"><span>📞</span> <span id="phone"></span></div>
            <a href="#" id="email" class="contact-item"><span>✉️</span> Email Me</a>
            <a href="#" id="linkedin" target="_blank" class="contact-item"><span>🔗</span> LinkedIn</a>
        </div>
    </footer>

    <script>
        fetch('/api/me')
            .then(response => response.json())
            .then(data => {
                document.getElementById('name').innerText = data.name;
                document.getElementById('role').innerText = data.role;
                document.getElementById('bio').innerText = data.bio;
                document.getElementById('phone').innerText = data.phone || "No Phone Added";
                document.getElementById('email').href = "mailto:" + data.email;
                document.getElementById('linkedin').href = data.linkedin || "#";
            });
    </script>
</body>
</html>
