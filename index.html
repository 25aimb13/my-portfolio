<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Aryan Kumar Pollai</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Skills Grid Layout */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .skill-card {
            background: #161616;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s ease;
        }

        .skill-card:hover {
            border-color: #3b82f6;
            transform: translateY(-5px);
        }

        .skill-name {
            display: block;
            font-weight: bold;
            color: #fff;
        }

        .skill-level {
            font-size: 0.8rem;
            color: #3b82f6;
        }

        /* Education Card Styling */
        .edu-card {
            background: #111;
            border-left: 4px solid #3b82f6;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 0 10px 10px 0;
            color: white;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">AKP.</div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <span class="badge">AI & ML Specialist</span>
            <h1 id="name">Loading...</h1>
            <p class="hero-role" id="role"></p>
            <p class="hero-bio" id="bio"></p>
            <div class="hero-btns">
                <a href="#contact" class="btn-primary">Get In Touch</a>
                <a href="https://github.com/25aimb13" target="_blank" class="btn-secondary">View GitHub</a>
            </div>
        </div>
    </section>

    <section id="about" class="details section-padding">
    <div class="container">
        
        <div class="education-container" style="margin-bottom: 40px;">
            <h2 style="font-size: 2rem; border-bottom: 2px solid #3b82f6; display: inline-block; margin-bottom: 20px; color: white;">Education</h2>
            <div id="education-list">
                </div>
        </div>

        <div class="skills-container">
            <h2 style="font-size: 2rem; border-bottom: 2px solid #3b82f6; display: inline-block; margin-bottom: 20px; color: white;">Technical Skills</h2>
            <div id="skills-list" class="skills-grid">
                </div>
        </div>

    </div>
</section>
    </section><section id="contact-form-section" class="details">
    <div class="form-container">
        <h2>Send a Message</h2>
        <form id="portfolio-form">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="contact-name" placeholder="Your Name" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="contact-email" placeholder="your.email@example.com" required>
            </div>
            <div class="input-group">
                <label>Message</label>
                <textarea id="contact-message" rows="5" placeholder="Your message here..." required></textarea>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer;">Send Message</button>
        </form>
        <p id="form-status" style="margin-top: 15px; color: #22c55e; display: none;">Message sent successfully!</p>
    </div>
</section>

    <footer id="contact">
    <h2>Let's Connect</h2>
    <div class="contact-grid">
        <a href="#" id="phone-link" class="contact-item">
            <span class="icon">📞</span> <span id="phone">Loading...</span>
        </a>
        
        <a href="#" id="email-link" class="contact-item">
            <span class="icon">✉️</span> Email Me
        </a>
        
        <a href="#" id="linkedin-link" target="_blank" class="contact-item">
            <span class="icon">🔗</span> LinkedIn
        </a>
    </div>
</footer>
<script>
    // 1. FETCH PROFILE INFO
    fetch('/api/me')
        .then(response => response.json())
        .then(data => {
            if (document.getElementById('name')) document.getElementById('name').innerText = data.name;
            if (document.getElementById('role')) document.getElementById('role').innerText = data.role;
            if (document.getElementById('bio')) document.getElementById('bio').innerText = data.bio;
            
            const phoneSpan = document.getElementById('phone');
            if (data.phone && phoneSpan) phoneSpan.innerText = data.phone;
        })
        .catch(err => console.error("Profile load error:", err));

    // 2. FETCH EDUCATION
    fetch('/api/education')
        .then(res => res.json())
        .then(data => {
            const eduList = document.getElementById('education-list');
            if (eduList) {
                eduList.innerHTML = data.map(edu => `
                    <div class="edu-card">
                        <h3>${edu.level}</h3>
                        <p>${edu.school_name} (${edu.board})</p>
                        <span style="color: #3b82f6; font-weight: bold;">${edu.year} | Score: ${edu.score}</span>
                    </div>
                `).join('');
            }
        });

    // 3. FETCH SKILLS
    fetch('/api/skills')
        .then(res => res.json())
        .then(data => {
            const skillsList = document.getElementById('skills-list');
            if (skillsList) {
                skillsList.innerHTML = data.map(s => `
                    <div class="skill-card">
                        <span class="skill-name">${s.skill_name}</span>
                        <span class="skill-level">${s.proficiency}</span>
                    </div>
                `).join('');
            }
        });

        // 2. CONTACT FORM LOGIC (Saves messages to TiDB)
        const portfolioForm = document.getElementById('portfolio-form');
        if (portfolioForm) {
            portfolioForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const status = document.getElementById('form-status');
                const formData = {
                    name: document.getElementById('contact-name').value,
                    email: document.getElementById('contact-email').value,
                    message: document.getElementById('contact-message').value
                };

                fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                })
                .then(response => {
                    if (!response.ok) throw new Error('Server error');
                    return response.json();
                })
                .then(data => {
                    if(data.success) {
                        status.style.display = 'block';
                        status.style.color = '#22c55e'; // Green
                        status.innerText = "Message truly saved in database!";
                        portfolioForm.reset();
                    }
                })
                .catch(err => {
                    status.style.display = 'block';
                    status.style.color = '#ef4444'; // Red
                    status.innerText = "Error: Message not sent.";
                    console.error("Submission error:", err);
                });
            });
        }
    </script>
</body>
</html>
