<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Admin Messages</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; padding: 40px; }
        .message-card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .name { color: #3b82f6; font-weight: bold; font-size: 1.2rem; }
        .email { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
        .text { line-height: 1.5; color: #ddd; }
        .date { font-size: 0.7rem; color: #555; text-align: right; }
    </style>
</head>
<body>
    <h1>Inbox: Contact Messages</h1>
    <div id="message-container">Loading messages...</div>

    <script>
        fetch('/api/messages')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('message-container');
                if (data.length === 0) {
                    container.innerHTML = "<p>No messages yet.</p>";
                    return;
                }
                container.innerHTML = data.map(m => `
                    <div class="message-card">
                        <div class="name">${m.name}</div>
                        <div class="email">${m.email}</div>
                        <div class="text">${m.message}</div>
                        <div class="date">${new Date(m.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('message-container').innerText = "Error loading messages.";
            });
    </script>
</body>
</html>
