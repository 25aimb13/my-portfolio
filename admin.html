<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Inbox</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: white; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .header { display: flex; justify-content: space-between; color: #007bff; font-weight: bold; }
        .msg { margin-top: 10px; color: #ccc; }
        .time { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
    <h2>Portfolio Inbox</h2>
    <div id="list">Loading messages...</div>

    <script>
        fetch('/api/messages')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('list');
                if(data.length === 0) {
                    list.innerHTML = "No messages found.";
                    return;
                }
                list.innerHTML = data.map(m => `
                    <div class="card">
                        <div class="header">
                            <span>${m.name}</span>
                            <span class="time">${new Date(m.created_at).toLocaleString()}</span>
                        </div>
                        <div style="font-size:0.9rem; color:#888;">${m.email}</div>
                        <div class="msg">${m.message}</div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('list').innerHTML = "Error loading data.";
            });
    </script>
</body>
</html>
